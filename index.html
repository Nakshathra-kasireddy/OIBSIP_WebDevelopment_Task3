<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temperature Converter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Temperature Converter</h1>

    <div class="input-group">

        <div class="field">
            <label>Degrees</label>
            <input type="number" id="temp">
        </div>

        <div class="field">
            <label>Type</label>

            <select id="unit">
                <option value="FtoC">Fahrenheit</option>
                <option value="CtoF">Celsius</option>
            </select>
        </div>

    </div>

    <div class="result-box">
        <label>Result</label>
        <h2 id="result">--</h2>
    </div>

    <button onclick="convertTemperature()">
        Convert
    </button>

</div>

<script src="script.js"></script>

</body>
</html>
